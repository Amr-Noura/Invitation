<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
</head>
<body>
<div id="envelope" class="envelope">
    <div class="envelope-box">
        <div class="seal">💛</div>
        <p class="text">Private Invitation</p>
        <button class="open-btn" onclick="openEnvelope()">
        ✨Open Invitation✨
        </button>
    </div>
</div>
<div id="invitation" class="card hidden">
    <h1>Wedding Invitation</h1>
    <h3><p class="welcome">We are delighted to invite you to our wedding</p></h3>
    <div class="names">
        <span class="groom">M</span>
        <span class="ampersand">&</span>
        <span class="bride">G</span>
    </div>
    <div class="details">
        <p class="info">
            <strong>Hall Name:</strong>
            
        </p>
        <p class="info">
            <strong>Location:</strong>
            <a class="location-btn" href="https://maps.app.goo.gl/SBTfSJHW1dGFduPS8?g_st=aw" target="_blank">Click here for location</a>📍
        </p> 
        <p class="info">
            <strong>Date:</strong>
            20/8/2026📅
        </p>
        <p class="info">
            <strong>Time:</strong>
            8:00 PM🕗 
        </p>
    </div>
    <h2 class="counter-title">Time Remaining</h2>
    <div id="countdown"></div>
</div>
<audio id="bgMusic" src="//" loop></audio>
<script src="script.js"></script>
</body>
</html>
